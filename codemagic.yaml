workflows:
  web-build:
    name: Build Web
    environment:
      node: 20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web
        # هذا هو الأمر الصحيح لمشروعك بناءً على ملف package.json
        script: npm run build
    artifacts:
      - dist/
