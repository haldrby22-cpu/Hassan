workflows:
  web-build:
    name: Build Web
    environment:
      node: 20 # تأكد من تحديد نسخة Node.js مناسبة
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web
        script: npx expo export:web
    artifacts:
      - dist/ # هذا هو المجلد الذي ينتج فيه Expo ملفات الويب عادة
