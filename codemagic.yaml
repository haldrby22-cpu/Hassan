workflows:
  web-build:
    name: Build Web
    environment:
      node: 20
    scripts:
      - name: Clean and Install dependencies
        script: |
          # حذف المجلدات وملفات القفل لتجنب تعارض المعمارية
          rm -rf node_modules package-lock.json
          # تثبيت المكتبات من جديد وبشكل نظيف
          npm install
      - name: Build Web
        script: npm run build
    artifacts:
      - dist/
