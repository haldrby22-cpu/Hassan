workflows:
  android-debug:
    name: Android Debug Workflow
    max_build_duration: 60
    environment:
      node: stable
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
