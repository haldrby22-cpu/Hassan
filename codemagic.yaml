workflows:
  android-debug:
    name: Android Debug Workflow
    max_build_duration: 60
    environment:
      groups:
        - android_credentials
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android
        script: |
          cd android   # تأكد أن هذا المجلد موجود ويحتوي على ملف gradlew
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
