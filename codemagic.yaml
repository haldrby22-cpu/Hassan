workflows:
  android-build:
    name: Build Android App
    max_build_duration: 60
    environment:
      node: latest
      # تعريف إصدار Gradle الذي يجب استخدامه
      GRADLE_VERSION: "8.10"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Sync android
        script: npx cap sync android
      - name: Build APK
        script: |
          cd android
          # نستخدم gradle مباشرة بدلاً من ./gradlew لتجنب مشاكل الـ jar
          gradle assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
