      - name: Build with Gradle 8.10 🛠️
        run: |
          cd android
          # إضافة هذه السطور لحل مشكلة الصلاحيات
          chmod +x gradlew
          # ثم إكمال باقي الأوامر
          ./gradlew wrapper --gradle-version 8.10.2
          npm install @capacitor/assets
          npx @capacitor/assets generate --android
          npx cap sync android
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
