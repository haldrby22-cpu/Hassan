name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Web Assets 🌐
        run: |
          npm install
          npm run build

      - name: Setup Capacitor & Android 📱
        run: |
          npm install -g @capacitor/cli
          npx cap sync android

      - name: Force Clean Build via Terminal 🛠️
        run: |
          # الانتقال لمجلد الأندرويد
          cd android
          
          # 1. التنظيف الجذري: حذف أي ملفات قديمة (Gradle & Wrapper)
          rm -rf gradle/
          rm -f gradlew
          rm -f gradlew.bat
          
          # 2. إنشاء نسخة جديدة ونظيفة من الـ Gradle Wrapper
          gradle wrapper --gradle-version 8.10.2
          
          # 3. التأكد من صلاحيات الملفات الجديدة
          chmod +x gradlew
          
          # 4. البناء الفعلي
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
