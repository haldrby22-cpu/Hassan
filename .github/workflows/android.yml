name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies 📦
        run: npm install

      - name: Create .env file 📄
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env

      - name: Build Web Application 🌐
        run: npm run build

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build with Gradle 8.10 🛠️
        run: |
          cd android
          # استخدام إصدار متوافق 8.10.2 وتجاوز مشاكل الاعتماديات
          ./gradlew wrapper --gradle-version 8.10.2
          chmod +x gradlew
          # إعداد الأصول
          npm install @capacitor/assets
          npx @capacitor/assets generate --android
          npx cap sync android
          # البناء
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
