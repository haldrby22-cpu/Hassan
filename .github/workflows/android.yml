name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Web Assets 🌐
        run: |
          npm install
          npm run build

      - name: Setup Capacitor & Android 📱
        run: |
          npm install -g @capacitor/cli
          npx cap add android || echo "Android exists"
          npx cap sync android

      - name: Repair & Build Android APK 🛠️
        run: |
          cd android
          # 1. إزالة أي إعدادات Gradle قديمة تسبب التعارض
          rm -rf gradle/wrapper/
          
          # 2. تحميل نسخة Gradle 8.10.2 المتوافقة يدوياً
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          
          # 3. استخدام نسخة Gradle المحملة مباشرة بدلاً من النظام
          export PATH=$PWD/gradle-8.10.2/bin:$PATH
          
          # 4. بناء المشروع
          gradle clean assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
