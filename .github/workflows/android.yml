name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Force Clean Build 🛠️
        run: |
          cd android
          # حذف كل ما يخص الـ wrapper لتجنب أي تعارض
          rm -rf gradle/
          rm -f gradlew
          rm -f gradlew.bat
          
          # تثبيت Gradle 8.10.2 في بيئة البناء
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          export GRADLE_HOME=$PWD/gradle-8.10.2
          export PATH=$GRADLE_HOME/bin:$PATH
          
          # تحديث Capacitor
          npm install @capacitor/assets
          npx @capacitor/assets generate --android
          npx cap sync android
          
          # البناء باستخدام Gradle المثبت يدوياً
          gradle clean assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
