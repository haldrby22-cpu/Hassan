name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          cd android
          # حذف ملفات Gradle المحلية التالفة لمنع حدوث خطأ Validation
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -rf gradle/wrapper/gradle-wrapper.properties
          
          # استخدام gradle المثبت في النظام مباشرة لبناء المشروع
          # سيقوم هذا تلقائياً بإنشاء wrapper نظيف وموافق للمعايير
          gradle assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
