name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK & AAB 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node Dependencies 📦
        run: npm ci || npm install

      - name: Build Web Application 🌐
        run: npm run build

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle Cache 🛠️
        uses: gradle/actions/setup-gradle@v3

      - name: Synchronize Web Assets with Capacitor 🔄
        run: npx cap sync android

      - name: Grant Execute Permission to Gradle Wrapper 🔑
        run: chmod +x android/gradlew

      - name: Generate Release Keystore 🔑
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -alias talabat \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass talabat123 \
            -keypass talabat123 \
            -dname "CN=Talabat, OU=App, O=TalabatFarshout, L=Farshout, S=Qena, C=EG"

      - name: Build Android Debug APK 📱
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Android Release Bundle (AAB) & APK 📦
        run: |
          cd android
          ./gradlew bundleRelease assembleRelease

      - name: Upload Debug APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Farshout-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Farshout-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB Bundle Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Farshout-Release-AAB
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
