name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android APK 🛠️
        run: |
          # 1. تثبيت الاعتماديات
          npm install
          
          # 2. التأكد من وجود منصة أندرويد
          # هذا السطر يحل مشكلة "android platform has not been added yet"
          npx cap add android || echo "Android platform already exists"
          
          # 3. إزالة ملفات Gradle التالفة لضمان بناء نظيف
          cd android
          rm -rf gradle/wrapper/
          
          # 4. تحميل Gradle 8.10.2 وتثبيته
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          export GRADLE_HOME=$PWD/gradle-8.10.2
          export PATH=$GRADLE_HOME/bin:$PATH
          
          # 5. مزامنة الأصول والبناء
          cd ..
          npx cap sync android
          cd android
          gradle clean assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
