name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          cd android
          # 1. إزالة أي ملفات Gradle محلية قد تكون تالفة
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -rf gradle/wrapper/gradle-wrapper.properties
          
          # 2. إنشاء نسخة Gradle 8.5 نظيفة ومتوافقة
          gradle wrapper --gradle-version 8.5
          
          # 3. إعطاء صلاحيات تنفيذ لـ gradlew الجديد
          chmod +x gradlew
          
          # 4. البناء مع تخطي التحقق الأمني للـ wrapper (لأننا قمنا بإنشائه للتو)
          ./gradlew assembleRelease --stacktrace -Dorg.gradle.wrapper.validation.mode=all
