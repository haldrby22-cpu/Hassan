name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          cd android
          # 1. إزالة ملفات Gradle التالفة الموجودة في المستودع
          rm -rf gradle/wrapper/gradle-wrapper.jar
          
          # 2. إنشاء نسخة Gradle نظيفة بإصدار 8.5 المتوافق
          gradle wrapper --gradle-version 8.5
          
          # 3. منح صلاحيات التنفيذ لملف البناء
          chmod +x gradlew
          
          # 4. بناء التطبيق
          ./gradlew assembleRelease --stacktrace
