name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          # 1. الانتقال لمجلد الأندرويد
          cd android
          
          # 2. حذف ملفات الـ wrapper الموجودة في المشروع لتجنب خطأ التحقق
          rm -rf gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          
          # 3. إنشاء wrapper جديد ونظيف ومتوافق مع النظام الحالي
          gradle wrapper --gradle-version 8.7
          
          # 4. منح صلاحيات التنفيذ وبناء التطبيق
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
