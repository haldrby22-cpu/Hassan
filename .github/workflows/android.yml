name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build 📦
        run: |
          npm install
          npm run build
          # التأكد من وجود مجلد dist
          ls -F
      
      - name: Setup Capacitor & Android 📱
        run: |
          # تأكد من تثبيت الـ CLI عالمياً للعمل في الـ Workflow
          npm install -g @capacitor/cli
          # إضافة منصة الأندرويد إذا لم تكن موجودة
          npx cap add android || echo "Android exists"
          # المزامنة
          npx cap sync android

      - name: Build Android APK 🛠️
        run: |
          cd android
          # تنظيف وبناء نظيف
          rm -rf gradle/wrapper/
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          export PATH=$PWD/gradle-8.10.2/bin:$PATH
          
          gradle clean assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
