name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies 📦
        run: npm install

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build with Fixed Gradle 🛠️
        run: |
          cd android
          # حذف أي ملفات قديمة تالفة
          rm -rf gradle/wrapper/gradle-wrapper.jar
          # تحميل نسخة رسمية نظيفة من الإنترنت مباشرة
          curl -L https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o gradle-8.10.2-bin.zip
          # تنفيذ أمر البناء مباشرة باستخدام Gradle المثبت في بيئة GitHub
          # بدلاً من الاعتماد على ملف الـ jar المحلي التالف
          export GRADLE_USER_HOME=$HOME/.gradle
          gradle assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
          # لضمان توافق البيئة
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
