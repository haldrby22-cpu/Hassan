name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Full Clean Build Strategy 🛠️
        run: |
          # 1. تحديث الاعتماديات
          npm install
          
          # 2. إعداد بيئة أندرويد من الصفر وتخطي الـ Wrapper التالف
          cd android
          # حذف أي ملفات إعدادات سابقة قد تسبب تعارض
          rm -rf gradle/wrapper/
          
          # 3. تحميل Gradle 8.10.2 رسمياً وتثبيته في بيئة البناء
          wget https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          export GRADLE_HOME=$PWD/gradle-8.10.2
          export PATH=$GRADLE_HOME/bin:$PATH
          
          # 4. بناء المشروع مباشرة بدون الاعتماد على gradlew
          # نستخدم gradle مباشرة مع تحديد الـ SDK
          gradle clean assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
