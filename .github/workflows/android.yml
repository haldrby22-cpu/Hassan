name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          cd android
          # إزالة أي ملفات gradle تالفة قد تعيق العملية
          rm -rf gradle/wrapper/gradle-wrapper.jar
          
          # تثبيت نسخة Gradle نظيفة ومحددة لضمان التوافق
          gradle wrapper --gradle-version 8.7
          
          # جعل ملف البناء الجديد قابلاً للتنفيذ
          chmod +x gradlew
          
          # بناء التطبيق مع عرض تفاصيل الخطأ في حال حدوثه
          ./gradlew assembleRelease --stacktrace
