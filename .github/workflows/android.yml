name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK & AAB 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies 📦
        run: npm ci || npm install

      - name: Create Firebase Config File 🔐
        run: |
          if [ -z "${{ secrets.FIREBASE_CONFIG }}" ]; then
            echo "FIREBASE_CONFIG secret is not set. Generating fallback firebase-applet-config.json..."
            echo '{"projectId":"tlpat-farshout-25c82","appId":"","apiKey":"","authDomain":"tlpat-farshout-25c82.firebaseapp.com","firestoreDatabaseId":"(default)","storageBucket":"tlpat-farshout-25c82.firebasestorage.app","messagingSenderId":"","measurementId":""}' > firebase-applet-config.json
          else
            echo "Creating firebase-applet-config.json from secrets..."
            echo '${{ secrets.FIREBASE_CONFIG }}' > firebase-applet-config.json
          fi

      - name: Build Web Application 🌐
        run: npm run build

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle Cache 🛠️
        uses: gradle/actions/setup-gradle@v3

      - name: Repair/Download Pristine Gradle Wrapper JAR 🛠️
        run: |
          mkdir -p android/gradle/wrapper
          curl -Lo android/gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.14.3/gradle/wrapper/gradle-wrapper.jar

      - name: Synchronize Web Assets with Capacitor 🔄
        run: npx cap sync android

      - name: Grant Execute Permission to Gradle Wrapper 🔑
        run: chmod +x android/gradlew

      - name: Generate Release Keystore 🔑
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -alias talabat \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass talabat123 \
            -keypass talabat123 \
            -dname "CN=Talabat, OU=App, O=TalabatFarshout, L=Farshout, S=Qena, C=EG"

      - name: Verify Keystore Location 🔍
        run: |
          echo "Checking if keystore exists..."
          ls -la android/app/

      - name: Build Android Debug APK 📱
        run: |
          cd android
          echo "🚀 Starting assembleDebug..."
          if ! ./gradlew assembleDebug --stacktrace > debug_build.log 2>&1; then
            echo "❌❌❌ ERROR: gradlew assembleDebug failed! ❌❌❌"
            echo "=================== COMPILATION ERRORS AND WARNINGS ==================="
            grep -i -n -C 2 -E "error:|exception|failed" debug_build.log | head -n 120 || true
            echo "=================== BUILD FAILED CONTEXT ==================="
            line_num=$(grep -n "BUILD FAILED" debug_build.log | cut -d: -f1 | head -n 1)
            if [ ! -z "$line_num" ]; then
              echo "Found 'BUILD FAILED' at line $line_num. Printing 100 lines before and 10 lines after:"
              start_line=$((line_num > 100 ? line_num - 100 : 1))
              end_line=$((line_num + 10))
              sed -n "${start_line},${end_line}p" debug_build.log
            else
              echo "Could not find 'BUILD FAILED' text. Printing last 200 lines:"
              tail -n 200 debug_build.log
            fi
            exit 1
          fi
          echo "✅ assembleDebug completed successfully!"

      - name: Build Android Release APK 📦
        run: |
          cd android
          echo "🚀 Starting assembleRelease..."
          if ! ./gradlew assembleRelease --stacktrace > release_build.log 2>&1; then
            echo "❌❌❌ ERROR: gradlew assembleRelease failed! ❌❌❌"
            echo "=================== COMPILATION ERRORS AND WARNINGS ==================="
            grep -i -n -C 5 -E "error|exception|failed|aapt" release_build.log | head -n 150 || true
            echo "=================== DETAILED MERGE RESOURCES ERRORS ==================="
            merge_line=$(grep -n "mergeReleaseResources" release_build.log | cut -d: -f1 | head -n 1)
            if [ ! -z "$merge_line" ]; then
              echo "Printing 150 lines around 'mergeReleaseResources' starting at line $merge_line:"
              start_line=$((merge_line > 20 ? merge_line - 20 : 1))
              end_line=$((merge_line + 130))
              sed -n "${start_line},${end_line}p" release_build.log
            fi
            echo "=================== BUILD FAILED CONTEXT ==================="
            line_num=$(grep -n "BUILD FAILED" release_build.log | cut -d: -f1 | head -n 1)
            if [ ! -z "$line_num" ]; then
              echo "Found 'BUILD FAILED' at line $line_num. Printing 100 lines before and 10 lines after:"
              start_line=$((line_num > 100 ? line_num - 100 : 1))
              end_line=$((line_num + 10))
              sed -n "${start_line},${end_line}p" release_build.log
            else
              echo "Could not find 'BUILD FAILED' text. Printing last 200 lines:"
              tail -n 200 release_build.log
            fi
            exit 1
          fi
          echo "✅ assembleRelease completed successfully!"

      - name: Upload Debug APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Farshout-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Farshout-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB Bundle Artifact (Skipped) 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Farshout-Release-AAB
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
