name: Build Talabat Farshout Android App 🤖

on:
  push:
    branches:
      - master
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Web Assets 🌐
        run: |
          npm install
          npm run build

      - name: Setup Capacitor 📱
        run: |
          npm install -g @capacitor/cli
          # إجبار Capacitor على إعادة توليد مجلد الأندرويد بملفات نظيفة
          npx cap sync android

      - name: Hard Reset & Build 🛠️
        run: |
          cd android
          # حذف أي شيء له علاقة بـ Gradle في المجلد
          rm -rf gradle/
          rm -f gradlew
          
          # تحميل Gradle 8.10.2 وتثبيته مباشرة (نتجنب 9.6.0 تماماً)
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          
          # إضافة النسخة المحملة لمسار النظام
          export PATH=$PWD/gradle-8.10.2/bin:$PATH
          
          # تنفيذ البناء
          gradle clean assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: "talabat123"
          KEY_PASSWORD: "talabat123"
          KEY_ALIAS: "talabat"
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: Talabat-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
