         name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          cd android
          # 1. إزالة ملفات Gradle المحلية (التي تسبب خطأ التلف والتحقق الأمني)
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -rf gradle/wrapper/gradle-wrapper.properties
          rm -rf gradlew
          
          # 2. إنشاء نسخة Gradle نظيفة ومحددة (8.5) مباشرة من خوادم Gradle الرسمية
          gradle wrapper --gradle-version 8.5
          
          # 3. منح صلاحيات التنفيذ للملف الجديد
          chmod +x gradlew
          
          # 4. بناء التطبيق
          ./gradlew assembleRelease --stacktrace
 ./gradlew assembleRelease --stacktrace -Dorg.gradle.wrapper.validation.mode=all
