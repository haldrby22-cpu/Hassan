name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          cd android
          
          # 1. حذف الملفات التالفة التي تسبب خطأ Validation
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -rf gradle/wrapper/gradle-wrapper.properties
          
          # 2. إنشاء Wrapper جديد وسليم من خوادم Gradle مباشرة
          gradle wrapper --gradle-version 8.7
          
          # 3. منح صلاحيات التنفيذ للملف الجديد
          chmod +x gradlew
          
          # 4. بناء التطبيق
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
